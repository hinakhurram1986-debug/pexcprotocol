<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plasma Exchange Calculator</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f4fd; border-radius: 8px; border-left: 5px solid #3498db; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.05em; }
        .highlight { font-weight: bold; color: #2980b9; }
        footer { text-align: center; font-size: 0.8em; margin-top: 20px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>TPE Calculator</h2>
    
    <div class="input-group">
        <label>Patient Gender</label>
        <select id="gender" onchange="calculate()">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>

    <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 170" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>Hematocrit (%)</label>
        <input type="number" id="hct" placeholder="e.g. 40" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>20% Human Albumin to use (ml)</label>
        <select id="albuminInput" onchange="calculate()">
            <option value="200">200 ml</option>
            <option value="250">250 ml</option>
        </select>
    </div>

    <div class="result-box" id="results">
        <div class="result-item">Total Plasma Volume: <span class="highlight" id="pvDisplay">0</span> ml</div>
        <hr>
        <div style="font-weight:bold; margin-bottom:10px; color:#e67e22;">Phase 1: 5% Albumin Replacement</div>
        <div class="result-item">20% Albumin: <span id="albUsed">0</span> ml</div>
        <div class="result-item">Normal Saline Add-on: <span id="nsAdd">0</span> ml</div>
        <div class="result-item"><strong>Total Phase 1 Volume:</strong> <span class="highlight" id="phase1Total">0</span> ml</div>
        <hr>
        <div style="font-weight:bold; margin-bottom:10px; color:#27ae60;">Phase 2: Remainder</div>
        <div class="result-item">Haemaccel Volume: <span class="highlight" id="haemaccelVol">0</span> ml</div>
    </div>

    <footer>*Protocol: 1.0 Plasma Volume Exchange</footer>
</div>

<script>
function calculate() {
    const gender = document.getElementById('gender').value;
    const weight = parseFloat(document.getElementById('weight').value);
    const height = parseFloat(document.getElementById('height').value) / 100; // convert to meters
    const hct = parseFloat(document.getElementById('hct').value) / 100;
    const albVolume = parseFloat(document.getElementById('albuminInput').value);

    if (weight > 0 && height > 0 && hct > 0) {
        // Nadler's Formula for Total Blood Volume (TBV)
        let tbv = 0;
        if (gender === 'male') {
            tbv = (0.3669 * Math.pow(height, 3)) + (0.03219 * weight) + 0.6041;
        } else {
            tbv = (0.3561 * Math.pow(height, 3)) + (0.03308 * weight) + 0.1833;
        }
        
        // Convert TBV from Liters to ml
        const tbvMl = tbv * 1000;
        
        // Calculate Plasma Volume (PV)
        const pv = tbvMl * (1 - hct);
        
        // Protocol: 1.0 PV exchange
        const exchangeGoal = pv * 1.0;

        // Phase 1: Diluting 20% Albumin to 5% (1:4 ratio)
        // To make 5% from 20%, total volume = Albumin Vol * 4
        const phase1Total = albVolume * 4;
        const nsNeeded = phase1Total - albVolume;

        // Phase 2: Remainder with Haemaccel
        const haemaccel = exchangeGoal - phase1Total;

        // Display results
        document.getElementById('pvDisplay').innerText = Math.round(pv);
        document.getElementById('albUsed').innerText = albVolume;
        document.getElementById('nsAdd').innerText = Math.round(nsNeeded);
        document.getElementById('phase1Total').innerText = Math.round(phase1Total);
        document.getElementById('haemaccelVol').innerText = haemaccel > 0 ? Math.round(haemaccel) : 0;
    }
}
</script>

</body>
</html>
