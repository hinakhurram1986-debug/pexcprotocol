<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPE Calculator - Age/Weight</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; padding: 20px; color: #1c1e21; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; color: #5f6368; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus { border-color: #1a73e8; }
        .result-box { margin-top: 25px; padding: 20px; background: #f8f9fa; border-radius: 10px; border: 1px solid #e8eaed; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1rem; }
        .highlight { font-weight: bold; color: #d93025; }
        .section-title { font-weight: bold; margin: 15px 0 8px 0; color: #188038; border-top: 1px solid #eee; pt: 10px; display: block; }
        footer { text-align: center; font-size: 0.75rem; margin-top: 20px; color: #70757a; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>TPE Calculator</h2>
    
    <div class="input-group">
        <label>Gender</label>
        <select id="gender" onchange="calculate()">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>

    <div class="input-group">
        <label>Age (Years)</label>
        <input type="number" id="age" placeholder="e.g. 45" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>Hematocrit (%)</label>
        <input type="number" id="hct" placeholder="e.g. 40" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>20% Albumin Volume (ml)</label>
        <select id="albInput" onchange="calculate()">
            <option value="200">200 ml</option>
            <option value="250">250 ml</option>
        </select>
    </div>

    <div class="result-box">
        <div class="result-item">Total Plasma Volume (1.0): <span class="highlight" id="pvDisplay">0</span> ml</div>
        
        <span class="section-title">Phase 1: 5% Albumin Replacement</span>
        <div class="result-item">20% Albumin: <span id="albUsed">0</span> ml</div>
        <div class="result-item">Normal Saline (Diluent): <span id="nsAdd">0</span> ml</div>
        <div class="result-item" style="font-weight:bold;">Total 5% Albumin: <span id="p1Total">0</span> ml</div>
        
        <span class="section-title">Phase 2: Remainder</span>
        <div class="result-item"><strong>Haemaccel Volume:</strong> <span class="highlight" id="haemaccel">0</span> ml</div>
    </div>

    <footer>
        Calculated using Gilcher's Rule of Five for TBV.<br>
        Protocol: 1.0 PV Exchange.
    </footer>
</div>

<script>
function calculate() {
    const gender = document.getElementById('gender').value;
    const age = parseFloat(document.getElementById('age').value);
    const weight = parseFloat(document.getElementById('weight').value);
    const hct = parseFloat(document.getElementById('hct').value) / 100;
    const albQty = parseFloat(document.getElementById('albInput').value);

    if (weight > 0 && age > 0 && hct > 0) {
        // Gilcher's Rule (Average values for adult)
        // Adjusts ml/kg based on gender/age slightly for a standard build
        let mlPerKg = (gender === 'male') ? 70 : 65;
        
        // Slight reduction for elderly (Age > 65)
        if (age > 65) {
            mlPerKg -= 5;
        }

        const tbv = weight * mlPerKg;
        const pv = tbv * (1 - hct);
        
        // Replacement Protocol (1.0 x PV)
        const totalToReplace = pv;

        // Phase 1: 5% Albumin calculation
        // To make 5% from 20%, you need 4x the albumin volume total
        const phase1Total = albQty * 4;
        const nsNeeded = phase1Total - albQty;

        // Phase 2: Remainder with Haemaccel
        const remHaemaccel = totalToReplace - phase1Total;

        // Update UI
        document.getElementById('pvDisplay').innerText = Math.round(pv);
        document.getElementById('albUsed').innerText = albQty;
        document.getElementById('nsAdd').innerText = Math.round(nsNeeded);
        document.getElementById('p1Total').innerText = Math.round(phase1Total);
        document.getElementById('haemaccel').innerText = remHaemaccel > 0 ? Math.round(remHaemaccel) : 0;
    }
}
</script>

</body>
</html>
